name: PathLearn CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ========================================
  # JOB 1 : Build Gateway Service
  # ========================================
  build-gateway:
    name: Build Gateway Service
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        working-directory: ./gateway-service
        run: chmod +x gradlew
      
      - name: Build with Gradle
        working-directory: ./gateway-service
        run: ./gradlew clean build -x test --no-daemon
      
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-jar
          path: gateway-service/build/libs/*.jar
          retention-days: 7

  # ========================================
  # JOB 2 : Build Enrollment Service
  # ========================================
  build-enrollment:
    name: Build Enrollment Service
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        working-directory: ./enrollment-service
        run: chmod +x gradlew
      
      - name: Build with Gradle
        working-directory: ./enrollment-service
        run: ./gradlew clean build -x test --no-daemon
      
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: enrollment-jar
          path: enrollment-service/build/libs/*.jar
          retention-days: 7

  # ========================================
  # JOB 3 : Build Course Service
  # ========================================
  build-course:
    name: Build Course Service
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        working-directory: ./course-service
        run: chmod +x gradlew
      
      - name: Build with Gradle
        working-directory: ./course-service
        run: ./gradlew clean build -x test --no-daemon
      
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: course-jar
          path: course-service/build/libs/*.jar
          retention-days: 7

  # ========================================
  # JOB 4 : Code Quality Analysis
  # ========================================
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: [build-gateway, build-enrollment, build-course]
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Run Checkstyle on Gateway
        working-directory: ./gateway-service
        run: ./gradlew checkstyleMain || true
        continue-on-error: true
      
      - name: Run Checkstyle on Enrollment
        working-directory: ./enrollment-service
        run: ./gradlew checkstyleMain || true
        continue-on-error: true
      
      - name: Run Checkstyle on Course
        working-directory: ./course-service
        run: ./gradlew checkstyleMain || true
        continue-on-error: true

  # ========================================
  # JOB 5 : Docker Build and Push (Optionnel)
  # ========================================
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-gateway, build-enrollment, build-course]
    if: false  # Activé si Docker Hub configuré
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and Push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pathlearn-gateway:latest
            ${{ secrets.DOCKER_USERNAME }}/pathlearn-gateway:${{ github.sha }}
      
      - name: Build and Push Enrollment
        uses: docker/build-push-action@v5
        with:
          context: ./enrollment-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pathlearn-enrollment:latest
            ${{ secrets.DOCKER_USERNAME }}/pathlearn-enrollment:${{ github.sha }}
      
      - name: Build and Push Course
        uses: docker/build-push-action@v5
        with:
          context: ./course-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pathlearn-course:latest
            ${{ secrets.DOCKER_USERNAME }}/pathlearn-course:${{ github.sha }}

  # ========================================
  # JOB 6 : Validation Docker Compose
  # ========================================
  docker-compose-validation:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    needs: [build-gateway, build-enrollment, build-course]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Validate docker-compose.yml
        run: docker-compose config
      
      - name: Build all services
        run: docker-compose build
      
      - name: Start services
        run: docker-compose up -d
      
      - name: Wait for services
        run: sleep 30
      
      - name: Check services health
        run: docker-compose ps
      
      - name: Test Gateway
        run: curl -f http://localhost:8080/actuator/health || true
        continue-on-error: true
      
      - name: Stop services
        run: docker-compose down

  # ========================================
  # JOB 7 : Notification Success
  # ========================================
  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [build-gateway, build-enrollment, build-course, docker-compose-validation]
    if: success()
    
    steps:
      - name: Success Notification
        run: |
          echo "0Pipeline réussi !"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Services: Gateway, Enrollment, Course"