server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/auth/**

        - id: course-service
          uri: ${COURSE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/courses/**
          filters:
            - AuthFilter

        - id: enrollment-service
          uri: ${ENROLLMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/inscriptions/**
          filters:
            - AuthFilter

app:
  jwt:
    secret: ${APP_JWT_SECRET:your-super-secret-key-that-is-at-least-32-characters}