server:
  port: 8082



spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    driverClassName: org.postgresql.Driver
    username: postgres
    password: 123456789

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: true
      path: /h2-console

  # Tell Jersey to run as a Filter so H2 console still works
  jersey:
    type: filter
    application-path: /

logging:
  level:
    org.springframework.boot.autoconfigure: DEBUG
app:
  jwt:
    secret: your-super-secret-key-that-is-at-least-32-characters
    expiration-ms: 86400000